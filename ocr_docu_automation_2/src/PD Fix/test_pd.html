<!DOCTYPE html>
<html>

<head>
    <title>Page Title</title>
</head>

<body>
    <h1>My First Heading</h1>
    <p>My first paragraph.</p>
    <input type="file" id="pdfInput">
    <button id="upload">Upload file</button>
</body>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const uploadBtn = document.getElementById('upload');
        const pdfInput = document.getElementById('pdfInput');
        uploadBtn.addEventListener('click', async () => {
            const file = pdfInput.files[0];

            if (!file) {
                alert("Please select a PDF file first.");
                return;
            }
            // Prepare the data to be sent
            const formData = new FormData();
            formData.append('document', file);

            submitDocumentMetadata = {
                "caseId": 1169924,
                "objectType": "Provider Disputes Document",
                "userId": "MCED",
                "title": "ProviderDispute",
                "fileName": "test_upload.pdf",
            }
            formData.append('submitDocumentMetadata', submitDocumentMetadata)

            try {
                const response = await fetch(`https://test-api.bluecrossma.com/api/v1/documents`, {
                    method: 'POST',
                    body: formData, // The browser handles the Content-Type header
                    headers: {
                        'Authorization': 'Bearer xMOu3cPKtbAhr2kEtYOVkQekJRLW',
                        'X-ClientName': 'Test_zz',
                        'X-SubmitDateTime': '2025-06-11T01:01:01.001Z',
                        'X-TrackingId': 'test_zz'
                    }
                });
                if (response.ok) {
                    const result = await response.json();
                    console.log('Upload successful:', result);
                } else {
                    console.error('Upload failed:', response.statusText);
                }
            } catch (error) {
                console.error('Error during upload:', error);
            }
        });
    });

</script>

</html>
